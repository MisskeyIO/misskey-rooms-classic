name: Check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          run_install: false

      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run format, lint, and type checks
        run: pnpm exec vp check

      - name: Build web assets
        run: pnpm --filter @misskey-rooms/web build

      - name: Validate API deploy
        run: pnpm --filter `@misskey-rooms/api` exec wrangler deploy --dry-run
