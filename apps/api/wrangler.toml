name = "misskey-rooms-classic"
main = "src/index.ts"
compatibility_date = "2026-03-21"

[assets]
directory = "../../dist"
not_found_handling = "single-page-application"
run_worker_first = ["/auth/*", "/rpc/*"]

[[kv_namespaces]]
binding = "MISSKEY_ROOMS"
id = "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx" # wrangler kv:namespace create MISSKEY_ROOMS で取得した値に差し替え
