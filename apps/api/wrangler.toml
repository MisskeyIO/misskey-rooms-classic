name = "misskey-rooms-classic"
main = "src/index.ts"
compatibility_date = "2026-03-21"
preview_urls = false
workers_dev = false

[assets]
directory = "../../dist"
not_found_handling = "single-page-application"
run_worker_first = ["/auth/*", "/rpc/*"]

[[kv_namespaces]]
binding = "MISSKEY_ROOMS"
id = "69d273f159d84475b9deb8da0331e1b3"

[secrets]
required = ["SSO_SERVICE_ID", "SSO_ISSUER", "SSO_AUDIENCE", "SSO_JWT_PUBLIC_KEY"]
